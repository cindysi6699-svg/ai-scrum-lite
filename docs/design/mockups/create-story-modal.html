<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Helmsman — 新建 Story</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        paper:{ DEFAULT:'#f7f7f8', card:'#ffffff', sub:'#fafafa' },
        line:{ DEFAULT:'#e4e4e7', soft:'#eef0f2' },
        ink:{ 900:'#18181b', 700:'#3f3f46', 500:'#71717a', 400:'#a1a1aa' },
        accent:{ DEFAULT:'#4f7cff', soft:'#eef2ff', dim:'#3a5bd0' },
      },
      fontFamily:{
        sans:['Inter','ui-sans-serif','system-ui','sans-serif'],
        mono:['ui-monospace','"JetBrains Mono"','"SF Mono"','Menlo','monospace'],
      },
    }}
  }
</script>
<style>
  body{ background:#f7f7f8; }
  .card-shadow{ box-shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06); }
  .modal-shadow{ box-shadow:0 24px 60px -12px rgba(16,24,40,.28); }
  .field-input{ width:100%; border:1px solid #e4e4e7; border-radius:8px; background:#fff; padding:.5rem .65rem; font-size:14px; color:#18181b; outline:none; transition:.12s; }
  .field-input::placeholder{ color:#a1a1aa; }
  .field-input:focus{ border-color:#4f7cff; box-shadow:0 0 0 3px rgba(79,124,255,.15); }
  .seg[data-active="true"]{ background:#4f7cff; color:#fff; border-color:#4f7cff; }
  ::-webkit-scrollbar{ width:8px; } ::-webkit-scrollbar-thumb{ background:#d4d4d8; border-radius:8px; }
</style>
</head>
<body class="font-sans text-ink-700 antialiased">

<!-- 背后看板的淡化层(表示这是浮层) -->
<div class="pointer-events-none fixed inset-0 select-none p-4 opacity-40 blur-[1px]">
  <div class="mb-4 h-6 w-48 rounded bg-zinc-200"></div>
  <div class="grid grid-cols-4 gap-3">
    <div class="h-64 rounded-xl border border-line bg-white"></div>
    <div class="h-64 rounded-xl border border-line bg-white"></div>
    <div class="h-64 rounded-xl border border-amber-200 bg-amber-50/40"></div>
    <div class="h-64 rounded-xl border border-line bg-white"></div>
  </div>
</div>

<!-- 遮罩 -->
<div class="fixed inset-0 bg-ink-900/30 backdrop-blur-[2px]"></div>

<!-- ===== Dialog ===== -->
<div class="fixed inset-0 grid place-items-center p-4">
  <div class="modal-shadow w-full max-w-[540px] overflow-hidden rounded-2xl border border-line bg-white">

    <!-- Header -->
    <div class="flex items-center justify-between border-b border-line px-5 py-3.5">
      <div class="flex items-center gap-2">
        <span class="grid h-6 w-6 place-items-center rounded-md bg-accent-soft text-accent-dim"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></span>
        <h2 class="text-sm font-semibold text-ink-900">新建 Story</h2>
        <span class="rounded bg-paper-sub px-1.5 py-0.5 text-[10px] text-ink-400">Sprint 1</span>
      </div>
      <button class="grid h-7 w-7 place-items-center rounded-md text-ink-400 hover:bg-paper-sub hover:text-ink-700"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>

    <!-- Body -->
    <div class="max-h-[70vh] space-y-4 overflow-y-auto px-5 py-4">

      <!-- 标题 (title) -->
      <div class="space-y-1.5">
        <label class="flex items-center gap-1 text-xs font-medium text-ink-700">标题 <span class="text-rose-500">*</span></label>
        <input class="field-input" placeholder="一句话说明这个 story" />
        <!-- 后端字段: title -->
      </div>

      <!-- 用户故事三段式 (→ userStory 单文本) -->
      <div class="space-y-1.5">
        <label class="text-xs font-medium text-ink-700">用户故事</label>
        <div class="space-y-2 rounded-lg border border-line bg-paper-sub p-2.5">
          <div class="flex items-center gap-2">
            <span class="w-12 shrink-0 text-right font-mono text-[11px] text-ink-400">作为</span>
            <input class="field-input bg-white" placeholder="团队 Lead" />
          </div>
          <div class="flex items-center gap-2">
            <span class="w-12 shrink-0 text-right font-mono text-[11px] text-ink-400">我想要</span>
            <input class="field-input bg-white" placeholder="把 story 指派给一个在线 agent" />
          </div>
          <div class="flex items-center gap-2">
            <span class="w-12 shrink-0 text-right font-mono text-[11px] text-ink-400">以便于</span>
            <input class="field-input bg-white" placeholder="它能领走这件可验证的活" />
          </div>
        </div>
        <p class="text-[11px] text-ink-400">三段会合并存入 <span class="font-mono">userStory</span>(后端暂为单文本,未拆独立字段)。</p>
      </div>

      <!-- 验收标准 (acceptanceCriteria 单文本) -->
      <div class="space-y-1.5">
        <label class="text-xs font-medium text-ink-700">验收标准</label>
        <textarea rows="4" class="field-input resize-y leading-relaxed" placeholder="每行一条,例如:&#10;Given 一个 agent 在线&#10;When 我把 story 指派给它&#10;Then story 进入「Agent 执行中」"></textarea>
        <p class="text-[11px] text-ink-400">每行一条,合并存入 <span class="font-mono">acceptanceCriteria</span>。</p>
      </div>

      <!-- 优先级 (priority enum, 默认 P1) -->
      <div class="space-y-1.5">
        <label class="text-xs font-medium text-ink-700">优先级</label>
        <div class="flex items-center gap-1.5">
          <button class="seg flex items-center gap-1.5 rounded-lg border border-line bg-white px-3 py-1.5 text-xs text-ink-700" data-p="P0"><span class="h-1.5 w-1.5 rounded-full bg-rose-500"></span>P0</button>
          <button class="seg flex items-center gap-1.5 rounded-lg border border-line bg-white px-3 py-1.5 text-xs text-ink-700" data-p="P1" data-active="true"><span class="h-1.5 w-1.5 rounded-full bg-amber-500"></span>P1</button>
          <button class="seg flex items-center gap-1.5 rounded-lg border border-line bg-white px-3 py-1.5 text-xs text-ink-700" data-p="P2"><span class="h-1.5 w-1.5 rounded-full bg-accent"></span>P2</button>
          <button class="seg flex items-center gap-1.5 rounded-lg border border-line bg-white px-3 py-1.5 text-xs text-ink-700" data-p="P3"><span class="h-1.5 w-1.5 rounded-full bg-ink-400"></span>P3</button>
        </div>
        <p class="text-[11px] text-ink-400">默认 <span class="font-mono">P1</span> · 映射 <span class="font-mono">priority</span> enum。</p>
      </div>

      <!-- 暂不支持的字段:透明告知 -->
      <div class="flex items-start gap-2 rounded-lg border border-dashed border-line bg-paper-sub px-3 py-2 text-[11px] text-ink-400">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mt-0.5 shrink-0"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
        <span><span class="text-ink-500">故事点</span>、<span class="text-ink-500">标签</span> 后端暂无字段,待加 schema 后再补到此表单。</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-2 border-t border-line bg-paper-sub px-5 py-3">
      <button class="rounded-lg px-3.5 py-2 text-sm text-ink-600 hover:bg-zinc-100">取消</button>
      <button class="flex items-center gap-1.5 rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white transition hover:bg-accent-dim active:scale-[.98]">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>创建 Story
      </button>
    </div>
    <!-- 提交 → createStoryTaskAction({ title, userStory, acceptanceCriteria, priority }) -->
  </div>
</div>

<script>
  document.querySelectorAll('.seg').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.seg').forEach(x=>x.dataset.active='false');
    b.dataset.active='true';
  }));
</script>
</body>
</html>
